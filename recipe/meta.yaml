{% set name = "viser" %}
{% set version = "1.0.24" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/viser-{{ version }}.tar.gz
  sha256: d1f52c8dccf553b1d5a8825f631344e2e91b2d5615dfac41cb81fd50035d9224

build:
  noarch: python
  number: 1
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - viser-build-client = viser._client_autobuild:build_client_entrypoint

requirements:
  host:
    - pip
    - python {{ python_min }}
    - hatchling
  run:
    - python >={{ python_min }}
    - requests >=2.0.0,<3.0.0
    - websockets >=13.1,<16.0.0
    - numpy >=1.0.0,<3.0.0
    - msgspec >=0.18.6,<1.0.0
    - imageio >=2.0.0,<3.0.0
    - tqdm >=4.0.0,<5.0.0
    - rich >=13.3.3,<15.0.0
    - trimesh >=3.21.7,<5.0.0
    - yourdfpy >=0.0.53,<1.0.0
    - typing-extensions >=4.0.0
    - zstandard >=0.20.0,<1.0.0

test:
  imports:
    - viser
  commands:
    - pip check
    - pytest
  source_files:
    - tests/
    - pyproject.toml
  requires:
    - pip
    - pytest
    - python {{ python_min }}

about:
  home: https://github.com/nerfstudio-project/viser
  summary: Web-based 3D visualization + Python
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jeongseok-meta
