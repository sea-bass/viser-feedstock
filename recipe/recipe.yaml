schema_version: 1

context:
  version: 1.0.24
  build_number: 1

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/viser-project/viser/archive/refs/tags/v${{ version }}.zip
  sha256: 810d8f5854dcac5d8fc93a26792d2857927a73f06aaf316ce5f15fb2cf2b88f5

build:
  noarch: python
  number: ${{ build_number }}
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - viser-build-client = viser._client_autobuild:build_client_entrypoint

requirements:
  host:
    - pip
    - python {{ python_min }}
    - hatchling
  run:
    - python >={{ python_min }}
    - requests >=2.0.0,<3.0.0
    - websockets >=13.1,<16.0.0
    - numpy >=1.0.0,<3.0.0
    - msgspec >=0.18.6,<1.0.0
    - imageio >=2.0.0,<3.0.0
    - tqdm >=4.0.0,<5.0.0
    - rich >=13.3.3,<15.0.0
    - trimesh >=3.21.7,<5.0.0
    - yourdfpy >=0.0.53,<1.0.0
    - typing-extensions >=4.0.0
    - zstandard >=0.20.0,<1.0.0

tests:
  - python:
      imports:
        - viser
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - pytest
    files:
      source:
        - tests/
        - pyproject.toml
    requirements:
      run:
        - hypothesis
        - pip
        - pytest
        - python {{ python_min }}

about:
  homepage: https://github.com/viser-project/viser
  summary: Web-based 3D visualization in Python
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jeongseok-meta
