schema_version: 1

context:
  name: viser
  version: "1.0.30"
  build_number: 0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  # PyPI sdist includes the pre-built web client. GitHub archives do not.
  - url: https://pypi.org/packages/source/v/viser/viser-${{ version }}.tar.gz
    sha256: 6a849a9ef141c97d4ac7bd7d970b81265e6d0130ee8ef1c2e18c0b46aa6b6283
  # Keep upstream's tests/docs without overlaying the GitHub source tree.
  - url: https://github.com/viser-project/viser/archive/refs/tags/v${{ version }}.zip
    sha256: f3536e4a1a4d448f64264c9acbe8e83ca37865b03c68d3dfa4d32259f8c9eff9
    target_directory: upstream-src

build:
  noarch: python
  number: ${{ build_number }}
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - viser-build-client = viser._client_autobuild:build_client_entrypoint

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - hatchling
  run:
    - python >=${{ python_min }}
    - requests >=2.0.0,<3.0.0
    - websockets >=13.1,<16.0.0
    - numpy >=1.0.0,<3.0.0
    - msgspec >=0.18.6,<1.0.0
    - imageio >=2.0.0,<3.0.0
    - tqdm >=4.0.0,<5.0.0
    - rich >=13.3.3,<15.0.0
    - trimesh >=3.21.7,<5.0.0
    - typing-extensions >=4.0.0
    - zstandard >=0.20.0,<1.0.0

tests:
  - python:
      imports:
        - viser
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      # Browser e2e tests require Playwright-managed browsers; keep the
      # feedstock validation to import and unit-level tests.
      # Keep localhost HTTP checks out of proxy environments.
      - export NO_PROXY="localhost,127.0.0.1,${NO_PROXY:-}"
      - export no_proxy="localhost,127.0.0.1,${no_proxy:-}"
      - pytest upstream-src/tests --ignore upstream-src/tests/e2e --deselect "upstream-src/tests/test_image_encode.py::test_image_encode_png" --deselect "upstream-src/tests/test_version_sync.py::test_versions_match"
    files:
      source:
        - upstream-src/tests/
        - upstream-src/docs/source/api/
    requirements:
      run:
        - hypothesis
        - pip
        - pytest
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/viser-project/viser
  summary: Web-based 3D visualization in Python
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jeongseok-meta
